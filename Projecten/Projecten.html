<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work | Stefan Meester</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <a href="../index.html"><img src="../assets/images/logo/logozwart.png" alt="Logo"></a>
        </div>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="Projecten.html" class="active">Work</a></li>
                <li><a href="../overig/about.html">About</a></li>
                <li><a href="../overig/contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main id="portfolio-section">
        <header class="portfolio-header">
            <span class="sub-title">Selected Works</span>
            <h1>Portfolio</h1>
            
            <div class="controls-container">
                <div class="glass-panel" id="filter-group">
                    <button class="f-btn active" data-filter="all">All</button>
                    <button class="f-btn" data-filter="jaar1">Year 1</button>
                    <button class="f-btn" data-filter="jaar2">Year 2</button>
                    <button class="f-btn" data-filter="video">Motion</button>
                    <button class="f-btn" data-filter="foto">Stills</button>
                </div>

                <div class="sort-wrapper">
                    <select id="sort-order" class="premium-select">
                        <option value="newest">Recent</option>
                        <option value="oldest">Archive</option>
                    </select>
                </div>
            </div>
        </header>

        <div class="project-grid" id="grid">
            <div class="card jaar1 Mallete" data-date="2024-05-10">
                <a href="project1.html">
                    <div class="image-wrapper">
                        <img src="../assets/images/thumb1.jpg" alt="Project 1">
                    </div>
                    <div class="overlay">
                        <div class="overlay-content">
                            <p class="category">Motion / Year 1</p>
                            <h3>Cinematic Short</h3>
                            <div class="line"></div>
                        </div>
                    </div>
                </a>
            </div>

            <div class="card jaar2 foto reveal" data-date="2025-01-20">
                <a href="project2.html">
                    <div class="image-wrapper">
                        <img src="../assets/images/thumb2.jpg" alt="Project 2">
                    </div>
                    <div class="overlay">
                        <div class="overlay-content">
                            <p class="category">Photography / Year 2</p>
                            <h3>Studio Portraits</h3>
                            <div class="line"></div>
                        </div>
                    </div>
                </a>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Stefan Meester — Av-Specialist</p>
    </footer>

    <script>
        const buttons = document.querySelectorAll('.f-btn');
        const cards = document.querySelectorAll('.card');
        let activeFilters = new Set(['all']);

        // Filter Logic
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                const filter = btn.dataset.filter;
                if (filter === 'all') {
                    activeFilters.clear();
                    activeFilters.add('all');
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                } else {
                    activeFilters.delete('all');
                    document.querySelector('[data-filter="all"]').classList.remove('active');
                    if (activeFilters.has(filter)) {
                        activeFilters.delete(filter);
                        btn.classList.remove('active');
                    } else {
                        activeFilters.add(filter);
                        btn.classList.add('active');
                    }
                }
                if (activeFilters.size === 0) {
                    activeFilters.add('all');
                    document.querySelector('[data-filter="all"]').classList.add('active');
                }
                updateDisplay();
            });
        });

        function updateDisplay() {
            cards.forEach(card => {
                const categories = Array.from(card.classList);
                const shouldShow = activeFilters.has('all') || 
                                   Array.from(activeFilters).some(f => categories.includes(f));
                card.style.opacity = shouldShow ? '1' : '0';
                card.style.transform = shouldShow ? 'translateY(0)' : 'translateY(20px)';
                setTimeout(() => {
                    card.style.display = shouldShow ? 'block' : 'none';
                }, 400);
            });
        }

        // Reveal on Scroll
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        cards.forEach(card => observer.observe(card));
    </script>
</body>
</html>
