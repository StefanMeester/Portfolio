<!-- De Filter Knoppen -->

<button class="f-btn active" data-filter="all">Alles</button>

<!-- Het Grid van Projecten -->

 <a href="project1.html">

<script>
filterSelection("all") // Laat alles zien bij het opstarten

function filterSelection(c) {
  var x, i;
  x = document.getElementsByClassName("filterDiv");
  if (c == "all") c = "";
  
  for (i = 0; i < x.length; i++) {
    // Verwijder de "show" class van alle elementen
    x[i].classList.remove("show");
    // Voeg "show" alleen toe als de class overeenkomt met het filter
    if (x[i].className.indexOf(c) > -1) {
      x[i].classList.add("show");
    }
  }
}
   const buttons = document.querySelectorAll('.f-btn');
const grid = document.getElementById('grid');
let activeFilters = new Set(['all']);
buttons.forEach(btn => {
btn.addEventListener('click', () => {
const filter = btn.dataset.filter;
if (filter === 'all') {
activeFilters.clear();
activeFilters.add('all');
buttons.forEach(b => b.classList.remove('active'));
btn.classList.add('active');
} else {
activeFilters.delete('all');
document.querySelector('[data-filter="all"]').classList.remove('active');
if (activeFilters.has(filter)) {
activeFilters.delete(filter);
btn.classList.remove('active');
} else {
activeFilters.add(filter);
btn.classList.add('active');
}

}
if (activeFilters.size === 0) {
activeFilters.add('all');
document.querySelector('[data-filter="all"]').classList.add('active');
}
render();
});
});
function render() {
const cards = Array.from(document.querySelectorAll('.card'));
cards.forEach(card => {
const categories = Array.from(card.classList);
const match = activeFilters.has('all') ||
Array.from(activeFilters).some(f => categories.includes(f));
card.style.display = match ? 'block' : 'none';
});
}
</script>
</body>
